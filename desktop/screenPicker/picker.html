<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>Демонстрация экрана</title>
    <style>
      :root {
        --bg-1: #0b0d10;
        --bg-2: #13171c;
        --bg-3: #1a1f25;
        --bg-4: #232830;
        --border: #232830;
        --text-1: #e2e8f0;
        --text-2: #94a3b8;
        --text-3: #64748b;
        --accent: #5865f2;
        --accent-hover: #4752c4;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg-1);
        color: var(--text-1);
        font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 13px;
        user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-2);
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
      }
      .tabs {
        display: flex;
        gap: 2px;
        padding: 0 18px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-2);
      }
      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        color: var(--text-2);
        font: inherit;
        padding: 10px 14px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }
      .tab:hover { color: var(--text-1); }
      .tab.active {
        color: var(--text-1);
        border-bottom-color: var(--accent);
      }
      main {
        flex: 1;
        overflow: auto;
        padding: 14px 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .card {
        appearance: none;
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
        cursor: pointer;
        text-align: left;
        color: inherit;
        font: inherit;
        transition: border-color 0.15s, background 0.15s, transform 0.05s;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card:hover {
        background: var(--bg-3);
        border-color: var(--bg-4);
      }
      .card.selected {
        border-color: var(--accent);
        background: rgba(88, 101, 242, 0.08);
      }
      .card:active { transform: scale(0.99); }
      .thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--bg-1);
        border-radius: 6px;
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .meta img.icon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        border-radius: 2px;
      }
      .meta .name {
        font-size: 12px;
        line-height: 1.3;
        color: var(--text-1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-2);
        font-size: 13px;
      }
      footer {
        border-top: 1px solid var(--border);
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--bg-2);
      }
      .audio-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        cursor: pointer;
        font-size: 12px;
        color: var(--text-2);
      }
      .audio-toggle input { accent-color: var(--accent); }
      .audio-toggle.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .audio-toggle .hint {
        color: var(--text-3);
        font-size: 11px;
      }
      .actions { display: flex; gap: 8px; }
      .btn {
        appearance: none;
        background: var(--bg-3);
        border: 1px solid var(--border);
        color: var(--text-1);
        font: inherit;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .btn:hover { background: var(--bg-4); }
      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Что показать?</h1>
      <button class="btn" id="btn-cancel-x" title="Отмена" aria-label="Закрыть">×</button>
    </header>

    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-kind="screen" role="tab">Экраны</button>
      <button type="button" class="tab" data-kind="window" role="tab">Окна</button>
    </nav>

    <main>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" hidden>Источники не найдены.</div>
    </main>

    <footer>
      <label class="audio-toggle" id="audio-row">
        <input type="checkbox" id="audio-input" />
        <span>
          Передавать звук системы
          <span class="hint" id="audio-hint"></span>
        </span>
      </label>
      <div class="actions">
        <button type="button" class="btn" id="btn-cancel">Отмена</button>
        <button type="button" class="btn btn-primary" id="btn-confirm" disabled>Поделиться</button>
      </div>
    </footer>

    <script src="./renderer.js"></script>
  </body>
</html>
