# =====================================================================
# Минимальный рабочий конфиг coturn для OwnCord.
# Перед запуском замени:
#   - realm=...          (на свой домен)
#   - user=owncord:...   (на свой пароль — тот же, что в docker-compose .env)
#   - external-ip=...    (на публичный IP сервера)
# =====================================================================

# Где слушать. Для Docker с network_mode: host — 0.0.0.0.
listening-port=3478
# alt-listening-port=3479

# STUN+TURN относительно этих адресов. external-ip ОБЯЗАТЕЛЕН, если
# сервер за NAT (ex: провайдер VPS). Формат: external-ip=PUBLIC/LAN
# (если есть отличие), или просто external-ip=PUBLIC.
external-ip=REPLACE_WITH_PUBLIC_IP

# Диапазон медиа-портов. Обязательно пробрось на firewall!
min-port=49152
max-port=65535

# --- Аутентификация ------------------------------------------------
# Long-term credentials (user:password).
fingerprint
lt-cred-mech
realm=owncord.example.com
user=owncord:CHANGE_ME_TO_STRONG_PASSWORD

# --- Безопасность --------------------------------------------------
no-multicast-peers
no-cli
no-loopback-peers

# Запрещаем relay на локальные/приватные сети — защита от SSRF.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255

# --- TLS (опционально) ---------------------------------------------
# Если есть сертификаты от certbot — раскомментируй и приложение сможет
# использовать turns:// на 5349 (TLS поверх TCP).
# tls-listening-port=5349
# cert=/etc/letsencrypt/live/owncord.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/owncord.example.com/privkey.pem
# cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20"

# --- Логи ----------------------------------------------------------
log-file=stdout
simple-log
